name: Refresh price data

# Why this exists: the demo page is static and reads results.json.
# This workflow regenerates that file daily from real market data and commits
# it, so GitHub Pages redeploys automatically. No server, no secrets.

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC, after the day-ahead auction publishes (~12:45 CET)
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit the refreshed data back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices and rebuild the cost model
        run: |
          python fetch_prices.py
          python cost_model.py

      - name: Commit refreshed data if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No change in results.json — nothing to commit."
          else
            git commit -m "chore: refresh price data ($(date -u +%Y-%m-%d))"
            git push
          fi
